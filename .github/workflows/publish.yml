name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node - <<'JS'
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const expected = `v${pkg.version}`;
          const actual = process.env.RELEASE_TAG;
          if (actual !== expected) {
            throw new Error(`Release tag ${actual} does not match package version ${pkg.version}. Expected ${expected}.`);
          }
          JS
      - run: npm test
      - run: npm run pack:check
      - name: Check whether this version is already published
        id: registry
        run: |
          node - <<'JS' > package-version.txt
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          process.stdout.write(pkg.version);
          JS
          VERSION="$(cat package-version.txt)"
          if npm view "heroshots@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "heroshots@$VERSION is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --provenance
        if: steps.registry.outputs.published != 'true'
